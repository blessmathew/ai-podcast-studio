services:
  - type: web
    name: ai-podcast-studio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
```

You also need to add `gunicorn` to your `requirements.txt` since Render uses it instead of Flask's dev server:
```
flask
edge-tts
requests
gunicorn
